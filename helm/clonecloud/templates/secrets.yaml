apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clonecloud.fullname" . }}-secrets
  labels:
    {{- include "clonecloud.labels" . | nindent 4 }}
type: Opaque
data:
  # In a real environment, this should be injected securely via a tool like External Secrets Operator
  # or HashiCorp Vault. For demonstration, we base64 encode the values provided in values.yaml.
  MONGO_URI: {{ .Values.backend.env.MONGO_URI | b64enc | quote }}
  # Example of other potential secrets:
  # API_KEY: {{ "your-secure-api-key" | b64enc | quote }}
