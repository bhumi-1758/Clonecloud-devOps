# Default deny all ingress traffic to namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  labels:
    {{- include "clonecloud.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress

---
# Allow Ingress to frontend from anywhere (or specific ingress controller namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-frontend
  labels:
    {{- include "clonecloud.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: frontend
  ingress:
  - {} # Allowing all for demonstration, in prod restrict to ingress-nginx selector

---
# Allow frontend to communicate with backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  labels:
    {{- include "clonecloud.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: backend
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    ports:
    - protocol: TCP
      port: 5000

---
# Allow backend to communicate with mongodb
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-mongodb
  labels:
    {{- include "clonecloud.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: mongodb
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: backend
    ports:
    - protocol: TCP
      port: 27017
